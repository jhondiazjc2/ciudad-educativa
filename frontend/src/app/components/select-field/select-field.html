<div class="select-field relative" (click)="$event.stopPropagation()">
  <button
    type="button"
    class="select-trigger"
    [disabled]="disabled"
    (click)="toggle($event)"
    [attr.aria-expanded]="open()"
    aria-haspopup="listbox"
  >
    <span class="truncate">{{ selectedLabel }}</span>
    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 shrink-0 opacity-60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
    </svg>
  </button>

  @if (open() && !disabled) {
    <ul class="select-menu" role="listbox">
      @if (searchable) {
        <li class="select-search-wrap">
          <input
            #searchInput
            type="search"
            class="select-search"
            [value]="filterQuery()"
            [placeholder]="searchPlaceholder"
            (input)="onFilterInput($event)"
            (click)="$event.stopPropagation()"
            (keydown)="$event.stopPropagation()"
            aria-label="Buscar opciones"
          />
        </li>
      }
      <li>
        <button type="button" class="select-option" [class.selected]="!value" (click)="choose(0)">
          {{ placeholder }}
        </button>
      </li>
      @for (opt of filteredOptions; track opt.id) {
        <li>
          <button type="button" class="select-option" [class.selected]="value === opt.id" (click)="choose(opt.id)">
            {{ opt.label }}
          </button>
        </li>
      } @empty {
        @if (filterQuery()) {
          <li class="select-empty px-3 py-2.5 text-sm text-muted">Sin coincidencias</li>
        }
      }
    </ul>
  }
</div>
