<div class="flex flex-col sm:flex-row items-center gap-6">
  <div
    class="relative w-40 h-40 shrink-0 rounded-full transition-all duration-300 shadow-inner"
    [style.background]="gradiente()"
    aria-hidden="true"
  >
    <div class="absolute inset-7 bg-white rounded-full flex flex-col items-center justify-center text-center px-2">
      @if (foco(); as item) {
        <span class="text-2xl font-bold text-primary-dark tabular-nums">{{ item.value }}</span>
        <span class="text-xs text-muted leading-tight">{{ item.label }}</span>
        <span class="text-xs font-semibold text-accent">{{ porcentaje(item.value) }}%</span>
      } @else {
        <span class="text-2xl font-bold text-primary-dark tabular-nums">{{ total() }}</span>
        <span class="text-xs text-muted">Total</span>
      }
    </div>
  </div>

  <div class="flex-1 w-full space-y-2" role="list">
    @for (item of items(); track item.id) {
      <button
        type="button"
        role="listitem"
        class="w-full flex items-center gap-3 rounded-xl p-2 -mx-2 text-left transition-colors hover:bg-primary-light/60 focus:outline-none focus-visible:ring-2 focus-visible:ring-accent"
        [class.bg-primary-light]="selectedId() === item.id"
        (mouseenter)="hoveredId.set(item.id)"
        (mouseleave)="hoveredId.set(null)"
        (click)="selectItem.emit(item.id)"
        [attr.aria-pressed]="selectedId() === item.id"
      >
        <span
          class="w-3 h-3 rounded-full shrink-0 transition-opacity"
          [style.background-color]="item.color"
          [class.opacity-40]="!resaltar(item.id)"
        ></span>
        <span class="flex-1 text-sm font-medium text-primary-dark">{{ item.label }}</span>
        <span class="text-sm tabular-nums text-muted">
          <strong class="text-primary-dark">{{ item.value }}</strong>
          <span class="ml-1">({{ porcentaje(item.value) }}%)</span>
        </span>
      </button>
    }
  </div>
</div>
