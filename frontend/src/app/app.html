@if (auth.isLoggedIn()) {
  <div class="min-h-screen">
    <nav class="sticky top-0 z-10 bg-white border-b border-border shadow-sm">
      <div class="flex justify-between items-center gap-4 px-4 sm:px-8 py-4">
        <div class="flex items-center gap-3 min-w-0">
          <img
            src="/CiudadEducativalogo.png"
            alt="Ciudad Educativa"
            width="176"
            height="44"
            class="h-9 sm:h-11 w-auto object-contain shrink-0"
          />
          <small class="text-muted text-xs hidden sm:block">Ciudad Educativa</small>
        </div>

        <div class="hidden md:flex flex-wrap items-center gap-6">
          <div class="flex flex-wrap gap-1">
            <a routerLink="/" routerLinkActive="nav-link-active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">Inicio</a>
            <a routerLink="/reportes" routerLinkActive="nav-link-active" class="nav-link">Reportes</a>
            <a routerLink="/matricular" routerLinkActive="nav-link-active" class="nav-link">Estudiantes</a>
            <a routerLink="/docentes" routerLinkActive="nav-link-active" class="nav-link">Docentes</a>
            @if (auth.isAdmin()) {
              <a routerLink="/colegios" routerLinkActive="nav-link-active" class="nav-link">Colegios</a>
            }
          </div>
          <div class="flex items-center gap-3 text-sm text-muted">
            <span>{{ auth.nombreDisplay() }}</span>
            <button class="btn-secondary text-sm py-2 px-3" type="button" (click)="logout()">Salir</button>
          </div>
        </div>

        <button
          type="button"
          class="md:hidden inline-flex items-center justify-center p-2 rounded-lg border border-border bg-white text-primary hover:bg-primary-light transition-colors"
          (click)="toggleMenu()"
          [attr.aria-expanded]="menuOpen()"
          aria-controls="mobile-nav"
          [attr.aria-label]="menuOpen() ? 'Cerrar menú' : 'Abrir menú'"
        >
          @if (menuOpen()) {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          }
        </button>
      </div>

      @if (menuOpen()) {
        <div id="mobile-nav" class="md:hidden border-t border-border px-4 py-3 bg-white">
          <div class="flex flex-col gap-1">
            <a routerLink="/" routerLinkActive="nav-link-active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link block" (click)="closeMenu()">Inicio</a>
            <a routerLink="/reportes" routerLinkActive="nav-link-active" class="nav-link block" (click)="closeMenu()">Reportes</a>
            <a routerLink="/matricular" routerLinkActive="nav-link-active" class="nav-link block" (click)="closeMenu()">Estudiantes</a>
            <a routerLink="/docentes" routerLinkActive="nav-link-active" class="nav-link block" (click)="closeMenu()">Docentes</a>
            @if (auth.isAdmin()) {
              <a routerLink="/colegios" routerLinkActive="nav-link-active" class="nav-link block" (click)="closeMenu()">Colegios</a>
            }
          </div>
          <div class="mt-3 pt-3 border-t border-border flex flex-col gap-3">
            <span class="text-sm text-muted">
              {{ auth.nombreDisplay() }}
            </span>
            <button class="btn-secondary text-sm py-2 px-3 self-start" type="button" (click)="logout()">Salir</button>
          </div>
        </div>
      }
    </nav>
    <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-8 overflow-visible">
      <router-outlet />
    </main>
  </div>
} @else {
  <router-outlet />
}
