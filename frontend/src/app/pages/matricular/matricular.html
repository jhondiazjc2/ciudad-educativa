<section>
  <header class="mb-6">
    <h1 class="text-3xl font-bold text-primary-dark m-0 mb-1">Matricular estudiante</h1>
    <p class="text-muted m-0">Registrar un estudiante en un colegio, grado y año académico</p>
  </header>

  @if (mensaje()) { <div class="alert-success">{{ mensaje() }}</div> }
  @if (error()) {
    <div #errorAlert class="alert-error" role="alert">{{ error() }}</div>
  }

  <form class="filter-panel" (ngSubmit)="guardar()">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-4">
      <label class="label min-w-0">
        Nombre completo
        <input class="input" type="text" [(ngModel)]="nombre" name="nombre" required />
      </label>
      <label class="label min-w-0">
        Tipo de documento
        <select class="input" [(ngModel)]="tipoDocumento" name="tipoDocumento">
          @for (t of tiposDocumento; track t.codigo) {
            <option [value]="t.codigo">{{ t.codigo }} — {{ t.nombre }}</option>
          }
        </select>
      </label>
      <label class="label min-w-0">
        Número de documento
        <input class="input" type="text" [(ngModel)]="numeroDocumento" name="numeroDocumento" required />
      </label>
      <label class="label min-w-0">
        Fecha de nacimiento
        <input class="input" type="date" [(ngModel)]="fechaNacimiento" name="fechaNacimiento" required />
      </label>
      <label class="label min-w-0">
        Colegio
        <app-select-field
          [(ngModel)]="colegioId"
          name="colegioId"
          [options]="colegioOptions"
          [disabled]="colegioBloqueado"
        />
      </label>
      <label class="label min-w-0">
        Grado
        <app-select-field
          [(ngModel)]="gradoId"
          name="gradoId"
          [options]="gradoOptions"
          (ngModelChange)="onGradoChange()"
        />
      </label>
      <label class="label min-w-0">
        Grupo
        <app-select-field
          [(ngModel)]="grupoId"
          name="grupoId"
          [options]="grupoOptions"
        />
      </label>
      <label class="label min-w-0">
        Año académico
        <app-select-field
          [(ngModel)]="anioAcademicoId"
          name="anioAcademicoId"
          [options]="anioOptions"
        />
      </label>
    </div>
    @if (error()) {
      <div class="alert-error mb-4" role="alert">{{ error() }}</div>
    }
    <button class="btn" type="submit" [disabled]="enviando()">
      {{ enviando() ? 'Guardando...' : 'Matricular estudiante' }}
    </button>
  </form>
</section>
